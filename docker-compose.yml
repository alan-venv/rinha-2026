services:
  haproxy:
    image: haproxy:3.2.3-alpine
    container_name: rinha-haproxy
    ports:
      - 9999:80
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      - backend
    depends_on:
      - rinha-service-1
      - rinha-service-2
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "50MB"

  rinha-service-1:
    image: ghcr.io/alan-venv/rinha-service-2026:1778501786
    container_name: rinha-service-1
    environment:
      - PORT=8080
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "150MB"

  rinha-service-2:
    image: ghcr.io/alan-venv/rinha-service-2026:1778501786
    container_name: rinha-service-2
    environment:
      - PORT=8080
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "150MB"

networks:
  backend:
    name: rinha-net
    driver: bridge
