services:
  haproxy:
    image: haproxy:3.2.3-alpine
    container_name: rinha-haproxy
    ports:
      - 9999:80
    volumes:
      - sockets:/sockets:rw
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      - backend
    depends_on:
      - rinha-service-1
      - rinha-service-2
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "50MB"

  rinha-service-1:
    image: ghcr.io/alan-venv/rinha-service-2026:1778205164
    container_name: rinha-service-1
    security_opt:
      - seccomp=unconfined
    environment:
      - SOCKET=/sockets/service-1.sock
    volumes:
      - sockets:/sockets:rw
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "150MB"

  rinha-service-2:
    image: ghcr.io/alan-venv/rinha-service-2026:1778205164
    container_name: rinha-service-2
    security_opt:
      - seccomp=unconfined
    environment:
      - SOCKET=/sockets/service-2.sock
    volumes:
      - sockets:/sockets:rw
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "150MB"

volumes:
  sockets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=16m,mode=1777

networks:
  backend:
    name: rinha-net
    driver: bridge
