services:
  nginx:
    image: nginx:alpine
    container_name: rinha-nginx
    ports:
      - 9999:80
    volumes:
      - sockets:/sockets:rw
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - backend
    depends_on:
      - rinha-service-1
      - rinha-service-2
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "50MB"

  rinha-service-1:
    image: ghcr.io/alan-venv/rinha-service-2026:1778499377
    container_name: rinha-service-1
    environment:
      - SOCKET=/sockets/service-1.sock
    volumes:
      - sockets:/sockets:rw
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "150MB"

  rinha-service-2:
    image: ghcr.io/alan-venv/rinha-service-2026:1778499377
    container_name: rinha-service-2
    environment:
      - SOCKET=/sockets/service-2.sock
    volumes:
      - sockets:/sockets:rw
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "150MB"

volumes:
  sockets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=16m,mode=1777

networks:
  backend:
    name: rinha-net
    driver: bridge
