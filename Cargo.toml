[package]
name = "rinha"
version = "0.1.0"
edition = "2024"

[dependencies]
mimalloc = "0.1.50"
actix-web = "4.13.0"
anyhow = "1.0.102"
chrono = { version = "0.4.44", features = ["serde"] }
serde = { version = "1.0.228", features = ["derive"] }
memmap2 = "0.9.10"
serde_json = "1.0.149"

[profile.release]
lto = true
panic = "abort"
strip = "symbols"
codegen-units = 1
